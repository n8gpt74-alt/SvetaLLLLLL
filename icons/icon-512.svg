<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2538;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b7aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- Calendar Icon -->
  <g transform="translate(256, 256)">
    <!-- Calendar body -->
    <rect x="-120" y="-100" width="240" height="200" rx="20" fill="url(#iconGradient)" filter="url(#glow)"/>
    
    <!-- Calendar header -->
    <rect x="-120" y="-100" width="240" height="50" rx="20" fill="#3b7aed"/>
    <rect x="-120" y="-75" width="240" height="25" fill="#3b7aed"/>
    
    <!-- Calendar rings -->
    <rect x="-90" y="-120" width="20" height="40" rx="10" fill="#4f8cff"/>
    <rect x="-30" y="-120" width="20" height="40" rx="10" fill="#4f8cff"/>
    <rect x="30" y="-120" width="20" height="40" rx="10" fill="#4f8cff"/>
    <rect x="90" y="-120" width="20" height="40" rx="10" fill="#4f8cff"/>
    
    <!-- Calendar grid -->
    <g fill="white" opacity="0.3">
      <rect x="-100" y="-40" width="30" height="25" rx="5"/>
      <rect x="-60" y="-40" width="30" height="25" rx="5"/>
      <rect x="-20" y="-40" width="30" height="25" rx="5"/>
      <rect x="20" y="-40" width="30" height="25" rx="5"/>
      <rect x="60" y="-40" width="30" height="25" rx="5"/>
      
      <rect x="-100" y="-5" width="30" height="25" rx="5"/>
      <rect x="-60" y="-5" width="30" height="25" rx="5"/>
      <rect x="-20" y="-5" width="30" height="25" rx="5"/>
      <rect x="20" y="-5" width="30" height="25" rx="5"/>
      <rect x="60" y="-5" width="30" height="25" rx="5"/>
      
      <rect x="-100" y="30" width="30" height="25" rx="5"/>
      <rect x="-60" y="30" width="30" height="25" rx="5"/>
      <rect x="-20" y="30" width="30" height="25" rx="5"/>
      <rect x="20" y="30" width="30" height="25" rx="5"/>
      <rect x="60" y="30" width="30" height="25" rx="5"/>
    </g>
    
    <!-- Highlighted date -->
    <rect x="-20" y="-5" width="30" height="25" rx="5" fill="white"/>
    
    <!-- Bell notification icon -->
    <g transform="translate(85, 65)" fill="#f97316" filter="url(#glow)">
      <path d="M 0,-15 Q -10,-15 -10,-5 Q -10,0 -10,5 L 10,5 Q 10,0 10,-5 Q 10,-15 0,-15 Z"/>
      <circle cx="0" cy="8" r="3"/>
      <rect x="-2" y="-18" width="4" height="3" rx="2"/>
    </g>
  </g>
</svg>
